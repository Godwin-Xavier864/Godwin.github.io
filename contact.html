<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 680px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 6px 0;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 16px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .result {
      margin-top: 16px;
      white-space: pre-wrap;
      background: #111827;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }
  </style>

</head>

<body>
  <div class="card">
    <h1>Contact Us</h1>

```
<form id="formdockForm">
  <label>First Name</label>
  <input id="firstName" placeholder="John" />

  <label>Last Name</label>
  <input id="lastName" placeholder="Doe" />

  <label>Email</label>
  <input id="email" type="email" placeholder="john@example.com" />

  <label>Organization</label>
  <input id="organization" placeholder="Company" />

  <label>Place</label>
  <input id="place" placeholder="City" />

  <label>Message</label>
  <textarea id="message" placeholder="Your message..."></textarea>

  <button type="submit" id="submitBtn">Submit</button>
</form>

<div class="result" id="result">Awaiting submission...</div>
```

  </div>

  <script>
    const form = document.getElementById("formdockForm");
    const result = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      submitBtn.disabled = true;
      result.textContent = "Submitting...";

      const payload = {
        project_api_key: "0ca857ca2254e81ccd3384582b7b7e64215391713a096f01", // 🔑 HARDCODED API KEY
        fields: {
          first_name: document.getElementById("firstName").value.trim(),
          last_name: document.getElementById("lastName").value.trim(),
          email: document.getElementById("email").value.trim(),
          organization: document.getElementById("organization").value.trim(),
          place: document.getElementById("place").value.trim(),
          message: document.getElementById("message").value.trim()
        },
        metadata: {
          page_url: window.location.href,
          referrer: document.referrer || "",
          user_agent: navigator.userAgent,
          timestamp: new Date().toISOString()
        }
      };

      try {
        const response = await fetch("https://api.formdock.in/api/forms/submit/", { // 🌐 HARDCODED ENDPOINT
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        result.textContent = "Success ✅\n" + JSON.stringify(data, null, 2);

      } catch (error) {
        result.textContent = "Error ❌\n" + String(error);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
